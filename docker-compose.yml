services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: hera_db
      POSTGRES_USER: hera
      POSTGRES_PASSWORD: hera_password
    ports:
      - "5433:5432"
    volumes:
      - hera_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hera -d hera_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8001:8001"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://hera:hera_password@db:5432/hera_db
      - REDIS_URL=redis://redis:6379/0

  worker:
    build: .
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://hera:hera_password@db:5432/hera_db
      - REDIS_URL=redis://redis:6379/0

  beat:
    build: .
    command: celery -A workers.celery_app beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://hera:hera_password@db:5432/hera_db
      - REDIS_URL=redis://redis:6379/0

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://api:8001
    depends_on:
      - api

volumes:
  hera_pgdata:
