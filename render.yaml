services:
  - type: web
    name: hera-api
    runtime: python
    buildCommand: "pip install -r requirements.txt && python -m alembic upgrade head"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        value: ${DATABASE_URL}
      - key: REDIS_URL
        value: ${REDIS_URL}
      - key: SECRET_KEY
        value: ${SECRET_KEY}
      - key: ENCRYPTION_KEY
        value: ${ENCRYPTION_KEY}
      - key: GOOGLE_CLIENT_ID
        value: ${GOOGLE_CLIENT_ID}
      - key: GOOGLE_CLIENT_SECRET
        value: ${GOOGLE_CLIENT_SECRET}
      - key: GOOGLE_REDIRECT_URI
        value: ${GOOGLE_REDIRECT_URI}
      - key: FRONTEND_URL
        value: ${FRONTEND_URL}
      - key: GROQ_API_KEY
        value: ${GROQ_API_KEY}
      - key: CORS_ORIGINS
        value: ${CORS_ORIGINS}

  - type: web
    name: hera-frontend
    runtime: node
    buildCommand: "npm --prefix frontend install && npm --prefix frontend run build"
    startCommand: "npm --prefix frontend run preview -- --host"
    envVars:
      - key: VITE_API_URL
        value: https://hera-api.onrender.com

databases:
  - name: hera-db
    engine: postgres
    version: "15"

  - name: hera-redis
    engine: redis
    version: "7"
